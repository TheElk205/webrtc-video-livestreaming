# docker-compose.yml
services:
  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    restart: unless-stopped
    environment:
      # Set this to your server's public hostname or IP in Coolify.
      # mediamtx includes it in ICE candidates so browsers can reach it over UDP.
      MTX_WEBRTCADDITIONALHOSTS: "ive.ff-drone.deployments.ferdinand-koeppen.tech"
    volumes:
      - recordings:/recordings
    ports:
     - 1935:1935   # RTMP
     - 8889:8889   # WebRTC HTTP
     - 8189:8189/udp  # WebRTC UDP (if needed)

  player:
    build:
      context: .
      dockerfile: Dockerfile.player
    restart: unless-stopped
    environment:
      WHEP_URL: /live_webrtc/whep

volumes:
  recordings:
