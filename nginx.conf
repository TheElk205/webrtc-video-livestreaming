server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Proxy WebRTC WHEP signalling to mediamtx so the browser
    # stays on the same HTTPS origin and avoids mixed-content blocks.
    location /live_webrtc/ {
        proxy_pass http://mediamtx:8889/live_webrtc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
